set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ',xterm-256color:Tc'
set-option -g prefix C-a

set-option -g status-style bg=default
set -g escape-time 50
set -g @themepack 'basic'
set-option -g status-style bg=#333333,fg=#ADD8E6
set -g status-right '%H:%M %d-%b-%y'

set -g history-limit 10000

set -g base-index 1
setw -g pane-base-index 1

bind-key C-n switch-client -n
bind-key C-p switch-client -p

setw -g mode-keys vi

bind -T copy-mode-vi v send-keys -X begin-selection
if-shell "uname | grep -q Darwin" \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"'

bind r source-file $HOME/.tmux.conf \; display-message "tmux.conf sourced"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind-key -r f run-shell "tmux neww ~/personal/.dotfiles/scripts/tmux-sessionizer"

# Cmd+1..9 (sent by Ghostty as ESC[9N~) jump straight to window N, no prefix
set -s user-keys[1] "\e[91~"
set -s user-keys[2] "\e[92~"
set -s user-keys[3] "\e[93~"
set -s user-keys[4] "\e[94~"
set -s user-keys[5] "\e[95~"
set -s user-keys[6] "\e[96~"
set -s user-keys[7] "\e[97~"
set -s user-keys[8] "\e[98~"
set -s user-keys[9] "\e[99~"
bind -n User1 select-window -t 1
bind -n User2 select-window -t 2
bind -n User3 select-window -t 3
bind -n User4 select-window -t 4
bind -n User5 select-window -t 5
bind -n User6 select-window -t 6
bind -n User7 select-window -t 7
bind -n User8 select-window -t 8
bind -n User9 select-window -t 9
